<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Дуэль зельеваров - Игра</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container" style="max-width: 900px;">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; flex-wrap: wrap; gap: 10px;">
            <h1 style="font-size: 1.8rem; margin: 0;">🧪 Дуэль зельеваров</h1>
            <div style="display: flex; gap: 8px; flex-wrap: wrap;">
                <span id="roleBadge" class="badge badge-player">⚔️ Игрок</span>
                <span id="houseBadge" class="badge">-</span>
            </div>
        </div>
        
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; background: #f5efe6; padding: 12px 16px; border-radius: 8px; flex-wrap: wrap; gap: 10px;">
            <div>
                <span style="font-weight: 600;">📖 Раунд:</span>
                <span id="roundNumber">0</span> / 8
            </div>
            <div>
                <span style="font-weight: 600;">❌ Ошибки:</span>
                <span id="errorsCount">0</span>
            </div>
            <div class="timer" id="timerDisplay" style="font-size: 1.8rem; padding: 6px 20px; margin: 0; background: #f5efe6; border: 2px solid #d4c5b5; border-radius: 8px;">
                45
            </div>
        </div>
        
        <div id="gameArea">
            <div style="text-align: center; padding: 40px 0; color: #5a3d2b;">
                <p style="font-size: 1.2rem;">⏳ Ожидание начала игры...</p>
                <div style="margin-top: 20px;">
                    <div class="progress-bar" style="height: 30px; max-width: 400px; margin: 0 auto;">
                        <div class="progress-fill" style="width: 0%;"></div>
                    </div>
                </div>
                <p style="margin-top: 12px; color: #8b6a47; font-size: 0.9rem;">Игра начнётся, когда присоединятся 2 игрока</p>
            </div>
        </div>
        
        <div id="playersPanel" style="margin-top: 20px;">
            <h3 style="font-size: 1.1rem;">👥 Игроки</h3>
            <div id="playersList" class="player-list"></div>
        </div>
        
        <!-- Информация о зелье -->
        <div id="potionInfo" style="margin-top: 12px; display: none;">
            <div class="info-box">
                <span class="label">🧪 Зелье:</span>
                <span class="value" id="potionName">-</span>
            </div>
        </div>
    </div>
    
    <!-- Модальное окно -->
    <div id="modal" class="modal">
        <div class="modal-content fade-in">
            <h2 class="modal-title" id="modalTitle">🏆 Игра завершена!</h2>
            <div id="modalBody"></div>
            <button onclick="closeModal()" class="btn">Вернуться на главную</button>
        </div>
    </div>
    
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const roomId = urlParams.get('room');
        
        if (!roomId) {
            window.location.href = '/';
        }
        
        let socket = null;
        let isPlayer = false;
        let isSpectator = false;
        let roundTimer = null;
        let timeLeft = 45;
        let gameActive = false;
        let answered = false;
        let currentRoundType = null;
        let selectedCount = 0;
        let actionCount = 0;
        let playerName = '';
        let playerHouse = '';
        
        // Подключение к Socket.IO
        socket = io();
        
        socket.on('connect', () => {
            console.log('Подключено к серверу');
            // Запрашиваем состояние игрока
            fetch(`/player-state/${roomId}`)
                .then(response => response.json())
                .then(data => {
                    if (data.exists) {
                        isPlayer = data.role === 'player';
                        isSpectator = data.role === 'spectator';
                        playerName = data.name;
                        playerHouse = data.house;
                        
                        document.getElementById('roleBadge').textContent = isPlayer ? '⚔️ Игрок' : '👁️ Наблюдатель';
                        document.getElementById('roleBadge').className = 'badge ' + (isPlayer ? 'badge-player' : 'badge-spectator');
                        
                        if (playerHouse) {
                            document.getElementById('houseBadge').textContent = playerHouse;
                            document.getElementById('houseBadge').className = 'badge badge-' + playerHouse.toLowerCase();
                        }
                        
                        // Обновляем список игроков
                        updatePlayersList();
                    } else {
                        window.location.href = '/';
                    }
                })
                .catch(() => {
                    window.location.href = '/';
                });
        });
        
        // Обработка ошибок
        socket.on('error', (message) => {
            alert('❌ Ошибка: ' + message);
        });
        
        // Начало раунда
        socket.on('roundStart', (data) => {
            console.log('Раунд начался:', data);
            gameActive = true;
            answered = false;
            currentRoundType = data.roundType;
            document.getElementById('roundNumber').textContent = data.roundNumber;
            timeLeft = 45;
            startTimer();
            
            // Показываем название зелья в первых раундах
            if (data.roundData && data.roundData.potionName) {
                document.getElementById('potionInfo').style.display = 'block';
                document.getElementById('potionName').textContent = data.roundData.potionName;
            } else {
                document.getElementById('potionInfo').style.display = 'none';
            }
            
            if (isPlayer) {
                renderRound(data);
            } else {
                renderSpectatorRound(data);
            }
        });
        
        // Обновление игрока
        socket.on('playerUpdate', (data) => {
            if (data.playerId === socket.id) {
                document.getElementById('errorsCount').textContent = data.errors || 0;
            }
            updatePlayersList();
        });
        
        // Конец раунда
        socket.on('roundEnd', (data) => {
            gameActive = false;
            answered = true;
            stopTimer();
            showRoundResults(data);
        });
        
        // Конец игры
        socket.on('gameEnd', (data) => {
            gameActive = false;
            stopTimer();
            showGameResults(data);
        });
        
        // Список игроков
        socket.on('playerList', (data) => {
            updatePlayersList();
        });
        
        function startTimer() {
            clearInterval(roundTimer);
            timeLeft = 45;
            updateTimerDisplay();
            
            roundTimer = setInterval(() => {
                timeLeft--;
                updateTimerDisplay();
                if (timeLeft <= 0) {
                    clearInterval(roundTimer);
                    document.getElementById('timerDisplay').classList.add('warning');
                }
            }, 1000);
        }
        
        function stopTimer() {
            clearInterval(roundTimer);
            document.getElementById('timerDisplay').classList.remove('warning');
        }
        
        function updateTimerDisplay() {
            document.getElementById('timerDisplay').textContent = timeLeft;
            if (timeLeft <= 10) {
                document.getElementById('timerDisplay').classList.add('warning');
            } else {
                document.getElementById('timerDisplay').classList.remove('warning');
            }
        }
        
        function renderRound(data) {
            const area = document.getElementById('gameArea');
            let html = '';
            selectedCount = 0;
            actionCount = 0;
            
            switch(data.roundType) {
                case 'ingredients':
                    html = renderIngredientsRound(data);
                    break;
                case 'actions':
                    html = renderActionsRound(data);
                    break;
                case 'event':
                    html = renderEventRound(data);
                    break;
                default:
                    html = '<p style="text-align: center; color: #5a3d2b;">Подготовка...</p>';
            }
            
            area.innerHTML = html;
        }
        
        function renderIngredientsRound(data) {
            const ingredients = data.roundData.ingredients || [];
            const totalNeeded = 3;
            
            let html = '<div class="fade-in">';
            html += `<h2 style="text-align: center; margin-bottom: 5px;">🌿 Выберите ингредиенты</h2>`;
            html += `<p style="text-align: center; color: #5a3d2b; margin-bottom: 15px;">Выберите ${totalNeeded} ингредиента в правильном порядке</p>`;
            html += '<div class="ingredients-grid">';
            
            ingredients.forEach((ing, index) => {
                const categoryMap = {
                    'plant': '🌿 Растительный',
                    'animal': '🐾 Животный',
                    'mineral': '💎 Минеральный',
                    'other': '✨ Другой'
                };
                html += `
                    <button class="ingredient-btn" onclick="selectIngredient('${ing.name}', ${index})" id="ing_${index}">
                        <span class="emoji">${ing.emoji || '🌿'}</span>
                        ${ing.name}
                        <span class="category">${categoryMap[ing.category] || ing.category}</span>
                        <span class="check-mark">✓</span>
                    </button>
                `;
            });
            
            html += '</div>';
            html += `<p style="text-align: center; color: #5a3d2b; margin-top: 10px;">Выбрано: <span id="selectedCount">0</span> / ${totalNeeded}</p>`;
            html += '</div>';
            
            return html;
        }
        
        function renderActionsRound(data) {
            const actions = data.roundData.actions || [];
            
            let html = '<div class="fade-in">';
            html += `<h2 style="text-align: center; margin-bottom: 5px;">⚡ Выполните действия</h2>`;
            html += `<p style="text-align: center; color: #5a3d2b; margin-bottom: 15px;">Выполните действия в правильной последовательности</p>`;
            html += '<div class="actions-grid">';
            
            actions.forEach((action, index) => {
                html += `
                    <button class="action-btn" onclick="selectAction('${action}', ${index})" id="action_${index}">
                        ${action}
                    </button>
                `;
            });
            
            html += '</div>';
            html += `<p style="text-align: center; color: #5a3d2b; margin-top: 10px;">Выполнено: <span id="actionCount">0</span> / ${actions.length}</p>`;
            html += '</div>';
            
            return html;
        }
        
        function renderEventRound(data) {
            const eventData = data.roundData;
            
            let html = '<div class="fade-in">';
            html += `<h2 style="text-align: center; margin-bottom: 5px;">⚡ Событие: ${eventData.name}</h2>`;
            html += `<p style="text-align: center; color: #5a3d2b; margin-bottom: 20px;">${eventData.description}</p>`;
            html += '<div class="event-options">';
            
            eventData.options.forEach((option, index) => {
                html += `
                    <button class="event-btn" onclick="selectEventOption(${index})" id="event_${index}">
                        ${option}
                    </button>
                `;
            });
            
            html += '</div>';
            html += '</div>';
            
            return html;
        }
        
        function renderSpectatorRound(data) {
            const area = document.getElementById('gameArea');
            let html = '<div style="text-align: center; padding: 20px;" class="fade-in">';
            html += `<h3>📖 Раунд ${data.roundNumber}</h3>`;
            html += `<p style="color: #5a3d2b;">Тип: ${getRoundTypeName(data.roundType)}</p>`;
            if (data.roundData && data.roundData.potionName) {
                html += `<p style="color: #5a3d2b;">🧪 Зелье: ${data.roundData.potionName}</p>`;
            }
            html += '<p style="color: #8b6a47; margin-top: 12px;">👁️ Наблюдайте за игроками...</p>';
            html += '</div>';
            area.innerHTML = html;
        }
        
        function getRoundTypeName(type) {
            const names = {
                'ingredients': 'Выбор ингредиентов',
                'actions': 'Последовательность действий',
                'event': 'Случайное событие'
            };
            return names[type] || type;
        }
        
        // Действия игрока
        function selectIngredient(ingredient, index) {
            if (!gameActive || answered || !isPlayer) return;
            
            const btn = document.getElementById('ing_' + index);
            if (btn && btn.disabled) return;
            
            // Проверяем, не выбрано ли уже 3
            const selectedEl = document.getElementById('selectedCount');
            const count = parseInt(selectedEl.textContent);
            if (count >= 3) return;
            
            // Отправляем действие на сервер
            socket.emit('gameAction', {
                roomId: roomId,
                action: ingredient,
                step: count
            });
            
            // Визуальное обновление
            btn.disabled = true;
            btn.classList.add('selected');
            selectedEl.textContent = count + 1;
        }
        
        function selectAction(action, index) {
            if (!gameActive || answered || !isPlayer) return;
            
            const btn = document.getElementById('action_' + index);
            if (btn && btn.disabled) return;
            
            // Проверяем, не выполнено ли уже все действия
            const actionEl = document.getElementById('actionCount');
            const actions = document.querySelectorAll('.action-btn');
            const count = parseInt(actionEl.textContent);
            if (count >= actions.length) return;
            
            // Отправляем действие на сервер
            socket.emit('gameAction', {
                roomId: roomId,
                action: action,
                step: count
            });
            
            // Визуальное обновление
            btn.disabled = true;
            btn.classList.add('completed');
            actionEl.textContent = count + 1;
        }
        
        function selectEventOption(index) {
            if (!gameActive || answered || !isPlayer) return;
            
            const btn = document.getElementById('event_' + index);
            if (btn && btn.disabled) return;
            
            // Отправляем действие на сервер
            socket.emit('gameAction', {
                roomId: roomId,
                action: index,
                step: 0
            });
            
            // Визуальное обновление
            const eventBtns = document.querySelectorAll('.event-btn');
            eventBtns.forEach(b => b.disabled = true);
            btn.style.background = '#a67c52';
            btn.style.color = '#f5efe6';
        }
        
        function updatePlayersList() {
            fetch(`/room-info/${roomId}`)
                .then(response => response.json())
                .then(data => {
                    if (data.exists && data.players) {
                        const list = document.getElementById('playersList');
                        let html = '';
                        
                        data.players.forEach((p, idx) => {
                            const errors = p.errors || 0;
                            const progress = p.progress || 0;
                            const completed = p.completed || false;
                            const houseEmoji = p.house === 'Гриффиндор' ? '🦁' : 
                                               p.house === 'Слизерин' ? '🐍' : 
                                               p.house === 'Когтевран' ? '🦅' : '🦡';
                            
                            let statusText = completed ? '✅ Готов' : `⬆ ${Math.round(progress * 100)}%`;
                            if (progress === 0 && !completed) statusText = '⏳ Ожидание';
                            
                            html += `
                                <div class="player-card slide-in" style="animation-delay: ${idx * 0.1}s">
                                    <div class="name">${houseEmoji} ${p.name}</div>
                                    <div class="house">${p.house || ''}</div>
                                    <div class="stats">
                                        <span>❌ Ошибки: ${errors}</span>
                                        <span>${statusText}</span>
                                    </div>
                                    ${p.selectedIngredients && p.selectedIngredients.length > 0 ? `
                                        <div class="ingredients-list">
                                            Выбрано: ${p.selectedIngredients.join(', ')}
                                        </div>
                                    ` : ''}
                                </div>
                            `;
                        });
                        
                        list.innerHTML = html || '<p style="text-align: center; color: #8b6a47;">Ожидание игроков...</p>';
                    }
                })
                .catch(() => {});
        }
        
        function showRoundResults(data) {
            const area = document.getElementById('gameArea');
            let html = '<div class="fade-in" style="text-align: center; padding: 20px;">';
            html += `<h3>✅ Раунд ${data.roundNumber} завершён!</h3>`;
            
            if (data.correctAnswer) {
                html += `<p style="color: #5a3d2b; margin: 8px 0;">Правильный ответ: ${Array.isArray(data.correctAnswer) ? data.correctAnswer.join(', ') : data.correctAnswer}</p>`;
            }
            
            data.results.forEach((r, idx) => {
                const isYou = r.playerId === socket.id;
                html += `<p style="margin: 6px 0; color: #5a3d2b;">${isYou ? '👤 ' : ''}${r.playerName}: ${r.roundErrors} ошибок (всего: ${r.errors})</p>`;
            });
            
            html += '<p style="margin-top: 15px; color: #8b6a47;">Следующий раунд через 3 секунды...</p>';
            html += '</div>';
            
            area.innerHTML = html;
            updatePlayersList();
        }
        
        function showGameResults(data) {
            const modal = document.getElementById('modal');
            const title = document.getElementById('modalTitle');
            const body = document.getElementById('modalBody');
            
            title.textContent = '🏆 Игра завершена!';
            
            let html = '';
            if (data.winner) {
                const isWinner = data.winner.id === socket.id;
                const winnerEmoji = isWinner ? '🎉' : '';
                html += `<h3 style="text-align: center; color: #a67c52; font-size: 1.8rem; margin-bottom: 20px;">
                    ${winnerEmoji} Победитель: ${data.winner.name} (${data.winner.house})!
                </h3>`;
                html += `<p style="text-align: center; color: #5a3d2b;">❌ Ошибок: ${data.winner.errors}</p>`;
            } else {
                html += '<h3 style="text-align: center; color: #5a3d2b;">🤝 Ничья!</h3>';
            }
            
            if (data.potionName) {
                html += `<p style="text-align: center; color: #8b6a47; margin: 8px 0;">🧪 Варили зелье: ${data.potionName}</p>`;
            }
            
            html += '<div class="modal-stats">';
            data.results.forEach(r => {
                const timeStr = r.totalTime ? Math.round(r.totalTime / 1000) + 'с' : '-';
                const isYou = r.playerId === socket.id;
                html += `<p><span>${isYou ? '👤 ' : ''}${r.playerName} (${r.house})</span><span>❌ ${r.errors} | ⏱️ ${timeStr}</span></p>`;
            });
            html += '</div>';
            
            body.innerHTML = html;
            modal.classList.add('active');
        }
        
        function closeModal() {
            window.location.href = '/';
        }
        
        // Закрытие модального окна при клике вне
        document.getElementById('modal').addEventListener('click', function(e) {
            if (e.target === this) {
                closeModal();
            }
        });
        
        // Обновление списка игроков каждые 2 секунды
        setInterval(updatePlayersList, 2000);
        
        // Обработка отключения
        socket.on('disconnect', () => {
            alert('❌ Соединение с сервером потеряно. Перезагрузите страницу.');
        });
        
        console.log('🧪 Игра загружена, комната:', roomId);
    </script>
</body>
</html>
