<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Дуэль Зельеваров</title>
    <link rel="stylesheet" href="style.css">
    <script src="/socket.io/socket.io.js"></script>
</head>
<body>

    <div id="screen-main" class="screen active">
        <h1 class="magic-title">Дуэль Зельеваров</h1>
        <div class="menu-buttons">
            <button onclick="navigate('create')">Создать комнату</button>
            <button onclick="navigate('join')">Присоединиться</button>
            <button onclick="alert('Книга заклинаний откроется позже!')">Книга заклинаний</button>
        </div>
    </div>

    <div id="screen-profile" class="screen">
        <h2 id="profile-title">Настройки комнаты</h2>
        <div class="form-group">
            <input type="text" id="username" placeholder="Ваше имя..." autocomplete="off">
            
            <div id="room-code-input-group" style="display: none;">
                <input type="text" id="room-code" placeholder="Код комнаты (4 знака)...">
            </div>

            <label>Выберите факультет:</label>
            <div class="faculty-selector">
                <button class="fac-btn" onclick="selectFaculty('Gryffindor')">Гриффиндор</button>
                <button class="fac-btn" onclick="selectFaculty('Slytherin')">Слизерин</button>
                <button class="fac-btn" onclick="selectFaculty('Ravenclaw')">Когтевран</button>
                <button class="fac-btn" onclick="selectFaculty('Hufflepuff')">Пуффендуй</button>
            </div>
        </div>
        <button class="primary-btn" onclick="submitProfile()">Далее</button>
        <button class="back-btn" onclick="goBack()">Назад</button>
    </div>

    <div id="screen-role" class="screen">
        <h2>Выберите вашу роль</h2>
        <p class="room-info">Код вашей комнаты: <span id="display-room-code" class="gold-text"></span></p>
        <div class="role-buttons">
            <button onclick="chooseRole('player')">Вступить в дуэль (Игрок)</button>
            <button onclick="chooseRole('observer')">Смотреть (Наблюдатель)</button>
        </div>
    </div>

    <div id="screen-duel" class="screen">
        <h2>Поле Битвы</h2>
        <div class="duel-container">
            <div class="player-side block">Ваша лаборатория</div>
            <div class="enemy-side block">Лаборатория соперника (Progress)</div>
        </div>
    </div>

    <script src="client.js"></script>
</body>
</html>
